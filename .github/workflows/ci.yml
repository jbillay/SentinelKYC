name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secrets-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  server-tests:
    name: Server — unit + node smoke tier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # Coverage thresholds (vitest.config.mjs) gate the pure engines.
      - run: npm run test:unit:coverage -w server
      - run: npm test -w server

  server-db:
    name: Server — migrations + DB smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinelkyc_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentinel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://sentinel:sentinel@localhost:5432/sentinelkyc_ci
      # auth-smoke boots the real app: session + seeded users + a CH key for
      # the require-time assert (never called over the network in this job).
      SESSION_SECRET: ci-only-session-secret-not-a-real-deployment
      CH_API_KEY: ci-dummy-key
      # No LLM on CI runners — boot warns instead of exiting (auth smoke only
      # exercises the HTTP auth surface, never the pipeline).
      LLM_BOOT_CHECK: warn
      SEED_ANALYST_PASSWORD: ci-analyst-pw-1
      SEED_REVIEWER_PASSWORD: ci-reviewer-pw-1
      SEED_ADMIN_PASSWORD: ci-admin-pw-1
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run db:migrate -w server
      - run: npm run db:smoke -w server
      - run: npm run users:seed -w server
      # Full login / CSRF / role-guard matrix over HTTP against the booted app.
      - run: npm run auth:smoke -w server

  web:
    name: Web — lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx oxlint .
        working-directory: web
      - run: npx eslint .
        working-directory: web
      - run: npm run build -w web

  # Single stable required check. The branch ruleset on `main` requires only
  # this job, so renaming any job's display `name:` above never breaks merging.
  # To make a NEW job block merges, add its job-id to `needs:` here.
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [secrets-scan, server-tests, server-db, web]
    if: ${{ always() }}
    steps:
      - name: Require all CI jobs to have succeeded
        run: |
          results="${{ needs.secrets-scan.result }} ${{ needs.server-tests.result }} ${{ needs.server-db.result }} ${{ needs.web.result }}"
          echo "job results: $results"
          for r in $results; do
            if [ "$r" != "success" ]; then
              echo "::error::A required CI job did not succeed (got '$r')."
              exit 1
            fi
          done
          echo "All required CI jobs succeeded."
